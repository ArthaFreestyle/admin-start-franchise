  <title>Dashboard Merchant</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --sf-primary: #099dff;
      --sf-primary-hover: #0080D6;
      --sf-accent: #b2de25;
      --sf-accent-dark: #3D6B00;
      --sf-accent-hover: #9EC81E;
      --sf-bg: #F4F8FF;
      --sf-card: #FFFFFF;
      --sf-text: #0A1F3D;
      --sf-text-muted: #6B7280;
      --sf-border: rgba(9, 157, 255, 0.15);
      --sf-border-solid: #D6ECFF;
      --sf-badge-orange: #FF6B2B;
      --sf-skeleton: #E8F4FF;
      --sf-font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --sf-transition: all 0.2s ease;
    }

    /* Scope reset inside our root so Squarespace global styles don't bleed in */
    .sf-layout *, .sf-layout *::before, .sf-layout *::after {
      box-sizing: border-box !important;
      margin: 0;
      padding: 0;
    }

    /* Header */
    .sf-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 28px;
    }

    .sf-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--sf-text);
    }

    .sf-header h1 span {
      color: var(--sf-primary);
    }

    /* Search */
    .sf-search-wrap {
      position: relative;
      flex: 1;
      max-width: 360px;
    }

    .sf-search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--sf-text-muted);
      pointer-events: none;
    }

    .sf-search {
      width: 100%;
      padding: 10px 12px 10px 38px;
      border: 1px solid var(--sf-border-solid);
      border-radius: 8px;
      font-family: var(--sf-font);
      font-size: 14px;
      color: var(--sf-text);
      background: var(--sf-card);
      outline: none;
      transition: var(--sf-transition);
    }

    .sf-search:focus {
      border-color: var(--sf-primary);
      box-shadow: 0 0 0 3px rgba(9, 157, 255, 0.12);
    }

    /* Card container */
    .sf-card {
      background: var(--sf-card);
      border: 1px solid var(--sf-border-solid);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(9, 157, 255, 0.06);
    }

    /* Table */
    .sf-table-wrap {
      overflow-x: auto;
    }

    .sf-layout table {
      width: 100%;
      border-collapse: collapse !important;
      font-size: 13.5px;
      font-family: var(--sf-font) !important;
    }

    .sf-layout thead {
      background: var(--sf-bg) !important;
      border-bottom: 1px solid var(--sf-border-solid) !important;
    }

    .sf-layout th {
      padding: 12px 16px !important;
      text-align: left !important;
      font-weight: 600 !important;
      color: var(--sf-text-muted) !important;
      font-size: 12px !important;
      text-transform: uppercase !important;
      letter-spacing: 0.04em !important;
      white-space: nowrap !important;
    }

    .sf-layout td {
      padding: 14px 16px !important;
      border-bottom: 1px solid var(--sf-border) !important;
      vertical-align: middle !important;
    }

    .sf-layout tbody tr:last-child td {
      border-bottom: none !important;
    }

    .sf-layout tbody tr:hover {
      background: rgba(9, 157, 255, 0.03) !important;
    }

    /* Thumbnail */
    .sf-thumb {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid var(--sf-border-solid);
      background: var(--sf-skeleton);
      display: block;
    }

    .sf-thumb-placeholder {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      background: var(--sf-skeleton);
      border: 1px solid var(--sf-border-solid);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Merchant name */
    .sf-merchant-name {
      font-weight: 600;
      color: var(--sf-text);
      max-width: 180px;
    }

    /* Price */
    .sf-price {
      font-weight: 700;
      color: var(--sf-primary);
      white-space: nowrap;
    }

    .sf-price-coret {
      text-decoration: line-through;
      color: var(--sf-text-muted);
      font-size: 12px;
      display: block;
    }

    /* Badges */
    .sf-layout .sf-badge {
      display: inline-flex !important;
      align-items: center !important;
      gap: 4px !important;
      padding: 3px 9px !important;
      border-radius: 99px !important;
      font-size: 11.5px !important;
      font-weight: 600 !important;
      white-space: nowrap !important;
      text-decoration: none !important;
    }

    .sf-layout .sf-badge-verified {
      background: rgba(9, 157, 255, 0.1) !important;
      color: #099dff !important;
    }

    .sf-layout .sf-badge-recommend {
      background: rgba(178, 222, 37, 0.18) !important;
      color: #3D6B00 !important;
    }

    .sf-layout .sf-badge-no {
      background: rgba(107, 114, 128, 0.1) !important;
      color: #6B7280 !important;
    }

    /* Action buttons */
    .sf-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: nowrap;
    }

    .sf-layout .sf-btn {
      display: inline-flex !important;
      align-items: center !important;
      gap: 4px !important;
      padding: 6px 11px !important;
      border-radius: 6px !important;
      font-family: var(--sf-font) !important;
      font-size: 12px !important;
      font-weight: 500 !important;
      cursor: pointer !important;
      text-decoration: none !important;
      border: none !important;
      transition: var(--sf-transition) !important;
      white-space: nowrap !important;
      line-height: 1.4 !important;
    }

    .sf-layout .sf-btn-detail {
      background: #099dff !important;
      color: #ffffff !important;
    }

    .sf-layout .sf-btn-detail:hover {
      background: #0080D6 !important;
      color: #ffffff !important;
    }

    .sf-layout .sf-btn-edit {
      background: rgba(178, 222, 37, 0.2) !important;
      color: #3D6B00 !important;
    }

    .sf-layout .sf-btn-edit:hover {
      background: rgba(178, 222, 37, 0.35) !important;
      color: #3D6B00 !important;
    }

    .sf-layout .sf-btn-hapus {
      background: rgba(255, 107, 43, 0.1) !important;
      color: #FF6B2B !important;
    }

    .sf-layout .sf-btn-hapus:hover {
      background: rgba(255, 107, 43, 0.2) !important;
      color: #FF6B2B !important;
    }

    /* Skeleton */
    .sf-skeleton-row td {
      padding: 14px 16px;
    }

    .sf-skeleton-block {
      height: 14px;
      border-radius: 6px;
      background: var(--sf-skeleton);
      animation: sf-shimmer 1.4s infinite linear;
      background-size: 400% 100%;
      background-image: linear-gradient(
        90deg,
        var(--sf-skeleton) 0%,
        #daeeff 40%,
        var(--sf-skeleton) 60%
      );
    }

    .sf-skeleton-img {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      background: var(--sf-skeleton);
      animation: sf-shimmer 1.4s infinite linear;
      background-size: 400% 100%;
      background-image: linear-gradient(
        90deg,
        var(--sf-skeleton) 0%,
        #daeeff 40%,
        var(--sf-skeleton) 60%
      );
    }

    @keyframes sf-shimmer {
      0% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Empty & error state */
    .sf-state {
      padding: 64px 24px;
      text-align: center;
    }

    .sf-state-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .sf-state h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--sf-text);
      margin-bottom: 6px;
    }

    .sf-state p {
      font-size: 14px;
      color: var(--sf-text-muted);
    }

    .sf-state-error h3 {
      color: var(--sf-badge-orange);
    }

    /* Summary bar */
    .sf-summary {
      padding: 10px 16px;
      font-size: 13px;
      color: var(--sf-text-muted);
      border-top: 1px solid var(--sf-border-solid);
    }

    /* Pagination */
    .sf-pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 14px 16px;
      border-top: 1px solid var(--sf-border-solid);
      flex-wrap: wrap;
    }

    .sf-layout .sf-page-btn {
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
      min-width: 34px !important;
      height: 34px !important;
      padding: 0 8px !important;
      border-radius: 7px !important;
      font-family: var(--sf-font) !important;
      font-size: 13px !important;
      font-weight: 500 !important;
      cursor: pointer !important;
      border: 1px solid #D6ECFF !important;
      background: #ffffff !important;
      color: #0A1F3D !important;
      transition: var(--sf-transition) !important;
      text-decoration: none !important;
      line-height: 1 !important;
    }

    .sf-layout .sf-page-btn:hover:not(:disabled):not(.sf-page-active) {
      border-color: #099dff !important;
      color: #099dff !important;
    }

    .sf-layout .sf-page-btn.sf-page-active {
      background: #099dff !important;
      border-color: #099dff !important;
      color: #ffffff !important;
      cursor: default !important;
    }

    .sf-layout .sf-page-btn:disabled {
      opacity: 0.4 !important;
      cursor: not-allowed !important;
    }

    .sf-page-ellipsis {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      font-size: 13px;
      color: #6B7280;
    }

    /* Layout */
    .sf-layout {
      display: flex !important;
      min-height: 100vh !important;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
      color: #0A1F3D !important;
      background: #F4F8FF !important;
    }

    /* Sidebar */
    .sf-sidebar {
      width: 232px;
      flex-shrink: 0;
      background: var(--sf-card);
      border-right: 1px solid var(--sf-border-solid);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      z-index: 100;
      transition: transform 0.25s ease;
    }

    .sf-sidebar-brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 16px 16px;
      border-bottom: 1px solid var(--sf-border-solid);
    }

    .sf-sidebar-logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sf-sidebar-logo-dot {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: var(--sf-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .sf-sidebar-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--sf-text);
      line-height: 1.2;
    }

    .sf-sidebar-title small {
      display: block;
      font-size: 10.5px;
      font-weight: 500;
      color: var(--sf-text-muted);
    }

    .sf-sidebar-close {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--sf-text-muted);
      font-size: 18px;
      padding: 4px;
      line-height: 1;
    }

    .sf-nav {
      padding: 12px 8px;
      flex: 1;
    }

    .sf-nav-group {
      margin-bottom: 20px;
    }

    .sf-nav-group-label {
      padding: 4px 8px 8px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--sf-text-muted);
    }

    .sf-layout .sf-nav-item {
      display: flex !important;
      align-items: center !important;
      gap: 9px !important;
      padding: 9px 10px !important;
      border-radius: 8px !important;
      font-size: 13.5px !important;
      font-weight: 500 !important;
      color: #6B7280 !important;
      text-decoration: none !important;
      transition: var(--sf-transition) !important;
      cursor: pointer !important;
      margin-bottom: 2px !important;
      background: transparent !important;
    }

    .sf-layout .sf-nav-item:hover {
      background: #F4F8FF !important;
      color: #0A1F3D !important;
    }

    .sf-layout .sf-nav-item.sf-nav-active {
      background: rgba(9, 157, 255, 0.1) !important;
      color: #099dff !important;
      font-weight: 600 !important;
    }

    .sf-layout .sf-nav-item svg {
      flex-shrink: 0 !important;
      opacity: 0.7 !important;
    }

    .sf-layout .sf-nav-item.sf-nav-active svg {
      opacity: 1 !important;
    }

    /* Main content */
    .sf-main {
      flex: 1;
      min-width: 0;
    }

    .sf-wrapper {
      max-width: 100%;
      padding: 28px 24px;
    }

    /* Hamburger */
    .sf-hamburger {
      display: none;
      background: none;
      border: 1px solid var(--sf-border-solid);
      border-radius: 7px;
      padding: 7px 9px;
      cursor: pointer;
      color: var(--sf-text);
      font-size: 16px;
      line-height: 1;
      transition: var(--sf-transition);
    }

    .sf-hamburger:hover {
      border-color: var(--sf-primary);
      color: var(--sf-primary);
    }

    /* Overlay (mobile) */
    .sf-overlay {
      display: none;
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: rgba(10, 31, 61, 0.35);
      z-index: 99;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sf-sidebar {
        position: fixed;
        left: 0;
        top: 0;
        height: 100vh;
        transform: translateX(-100%);
      }

      .sf-sidebar.sf-open {
        transform: translateX(0);
        box-shadow: 4px 0 24px rgba(9, 157, 255, 0.12);
      }

      .sf-overlay.sf-open {
        display: block;
        pointer-events: auto;
      }

      .sf-sidebar-close {
        display: block;
      }

      .sf-hamburger {
        display: flex;
      }

      .sf-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .sf-header-left {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
      }

      .sf-search-wrap {
        max-width: 100%;
        width: 100%;
      }
    }

    @media (min-width: 769px) {
      .sf-header-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }
    }
  </style>
</head>

              <td><div class="sf-skeleton-img"></div></td>
              <td><div class="sf-skeleton-block" style="width:100px"></div></td>
              <td><div class="sf-skeleton-block" style="width:90px"></div></td>
              <td><div class="sf-skeleton-block" style="width:95px"></div></td>
              <td><div class="sf-skeleton-block" style="width:60px"></div></td>
              <td><div class="sf-skeleton-block" style="width:70px"></div></td>
              <td><div class="sf-skeleton-block" style="width:70px"></div></td>
              <td><div class="sf-skeleton-block" style="width:90px"></div></td>
              <td><div class="sf-skeleton-block" style="width:160px"></div></td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="sf-summary" id="sf-summary" style="display:none"></div>
      <div class="sf-pagination" id="sf-pagination" style="display:none"></div>
    </div>
      </div><!-- /.sf-wrapper -->
    </div><!-- /.sf-main -->
  </div><!-- /.sf-layout -->

  <script>
    function toggleSidebar() {
      document.getElementById('sf-sidebar').classList.toggle('sf-open');
      document.getElementById('sf-overlay').classList.toggle('sf-open');
    }

    const SUPABASE_URL = 'https://abhfhsnkwdjoixukwsju.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFiaGZoc25rd2Rqb2l4dWt3c2p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNzkxMTYsImV4cCI6MjA4ODc1NTExNn0.LUHW6BsmH8i4oKEfvJoCIRNhFn6Vj2EosjcrVQZTVfg';

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const PAGE_SIZE = 20;
    let currentPage = 1;
    let totalCount = 0;
    let searchQuery = '';
    let searchTimer = null;

    function formatIDR(num) {
      if (num == null) return '-';
      return 'Rp ' + Number(num).toLocaleString('id-ID');
    }

    function formatDate(str) {
      if (!str) return '-';
      const d = new Date(str);
      return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function badgeVerified(val) {
      return val
        ? `<span class="sf-badge sf-badge-verified">&#10003; Verified</span>`
        : `<span class="sf-badge sf-badge-no">Belum</span>`;
    }

    function badgeRecommend(val) {
      return val
        ? `<span class="sf-badge sf-badge-recommend">&#9733; Rekomendasi</span>`
        : `<span class="sf-badge sf-badge-no">-</span>`;
    }

    function resolveImg(url) {
      if (!url) return '';
      url = url.trim();
      if (url.includes('lh3.googleusercontent.com')) return url;
      let m = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
      if (m) return 'https://lh3.googleusercontent.com/d/' + m[1] + '=s600';
      m = url.match(/drive\.google\.com\/.*[?&]id=([a-zA-Z0-9_-]+)/);
      if (m) return 'https://lh3.googleusercontent.com/d/' + m[1] + '=s600';
      m = url.match(/drive\.google\.com\/thumbnail\?id=([a-zA-Z0-9_-]+)/);
      if (m) return 'https://lh3.googleusercontent.com/d/' + m[1] + '=s600';
      if (url.includes('squarespace-cdn.com')) return url + '?format=500w';
      return url;
    }

    function thumbnailCell(url) {
      const resolved = resolveImg(url);
      if (resolved) {
        return `<img class="sf-thumb" src="${escHtml(resolved)}" alt="thumbnail" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <div class="sf-thumb-placeholder" style="display:none">
                  <svg width="20" height="20" fill="none" stroke="#D6ECFF" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                </div>`;
      }
      return `<div class="sf-thumb-placeholder">
                <svg width="20" height="20" fill="none" stroke="#D6ECFF" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              </div>`;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function showSkeleton() {
      const tbody = document.getElementById('sf-tbody');
      const skeletonRow = `
        <tr class="sf-skeleton-row">
          <td><div class="sf-skeleton-img"></div></td>
          <td><div class="sf-skeleton-block" style="width:120px"></div></td>
          <td><div class="sf-skeleton-block" style="width:80px"></div></td>
          <td><div class="sf-skeleton-block" style="width:90px"></div></td>
          <td><div class="sf-skeleton-block" style="width:60px"></div></td>
          <td><div class="sf-skeleton-block" style="width:70px"></div></td>
          <td><div class="sf-skeleton-block" style="width:70px"></div></td>
          <td><div class="sf-skeleton-block" style="width:90px"></div></td>
          <td><div class="sf-skeleton-block" style="width:160px"></div></td>
        </tr>`;
      tbody.innerHTML = skeletonRow.repeat(5);
      document.getElementById('sf-summary').style.display = 'none';
      document.getElementById('sf-pagination').style.display = 'none';
    }

    function renderRows(merchants) {
      const tbody = document.getElementById('sf-tbody');

      if (merchants.length === 0) {
        tbody.innerHTML = `
          <tr><td colspan="9">
            <div class="sf-state">
              <div class="sf-state-icon">&#128203;</div>
              <h3>Tidak ada merchant</h3>
              <p>Belum ada data merchant yang ditemukan.</p>
            </div>
          </td></tr>`;
        document.getElementById('sf-summary').style.display = 'none';
        document.getElementById('sf-pagination').style.display = 'none';
        return;
      }

      tbody.innerHTML = merchants.map(m => {
        const kategori = m.franchise_categories ? escHtml(m.franchise_categories.name) : '-';
        const hargaCoret = m.harga_coret
          ? `<span class="sf-price-coret">${formatIDR(m.harga_coret)}</span>`
          : '';
        return `
          <tr>
            <td>${thumbnailCell(m.thumbnail)}</td>
            <td><div class="sf-merchant-name">${escHtml(m.nama)}</div></td>
            <td>${kategori}</td>
            <td>
              <span class="sf-price">${formatIDR(m.harga)}</span>
              ${hargaCoret}
            </td>
            <td>${m.tahun_berdiri || '-'}</td>
            <td>${badgeVerified(m.is_verified)}</td>
            <td>${badgeRecommend(m.is_recommend)}</td>
            <td style="white-space:nowrap;color:var(--sf-text-muted)">${formatDate(m.created_at)}</td>
            <td>
              <div class="sf-actions">
                <a class="sf-btn sf-btn-detail" href="merchant-detail?id=${m.id}">Detail</a>
                <a class="sf-btn sf-btn-edit" href="merchant-edit?id=${m.id}">Edit</a>
                <a class="sf-btn sf-btn-hapus" href="merchant-delete?id=${m.id}">Hapus</a>
              </div>
            </td>
          </tr>`;
      }).join('');
    }

    function renderSummary(page, rowCount) {
      const from = (page - 1) * PAGE_SIZE + 1;
      const to = (page - 1) * PAGE_SIZE + rowCount;
      const el = document.getElementById('sf-summary');
      el.textContent = `Menampilkan ${from}–${to} dari ${totalCount} merchant`;
      el.style.display = 'block';
    }

    function renderPagination(page, totalPages) {
      const el = document.getElementById('sf-pagination');
      if (totalPages <= 1) {
        el.style.display = 'none';
        return;
      }

      const pages = [];

      // always show first page
      pages.push(1);

      // ellipsis after first
      if (page > 4) pages.push('…');

      // window around current page
      for (let p = Math.max(2, page - 2); p <= Math.min(totalPages - 1, page + 2); p++) {
        pages.push(p);
      }

      // ellipsis before last
      if (page < totalPages - 3) pages.push('…');

      // always show last page
      if (totalPages > 1) pages.push(totalPages);

      let html = `
        <button class="sf-page-btn" onclick="goToPage(${page - 1})" ${page === 1 ? 'disabled' : ''}>&#8592; Prev</button>
      `;

      for (const p of pages) {
        if (p === '…') {
          html += `<span class="sf-page-ellipsis">…</span>`;
        } else {
          html += `<button class="sf-page-btn ${p === page ? 'sf-page-active' : ''}" onclick="goToPage(${p})">${p}</button>`;
        }
      }

      html += `
        <button class="sf-page-btn" onclick="goToPage(${page + 1})" ${page === totalPages ? 'disabled' : ''}>Next &#8594;</button>
      `;

      el.innerHTML = html;
      el.style.display = 'flex';
    }

    function goToPage(page) {
      if (page < 1 || page > Math.ceil(totalCount / PAGE_SIZE)) return;
      loadMerchants(page, searchQuery);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function filterMerchants(val) {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => loadMerchants(1, val.trim()), 350);
    }

    async function loadMerchants(page = 1, query = '') {
      currentPage = page;
      searchQuery = query;

      const from = (page - 1) * PAGE_SIZE;
      const to = from + PAGE_SIZE - 1;

      showSkeleton();

      let q = client
        .from('franchise_merchant')
        .select('id, nama, harga, harga_coret, thumbnail, is_verified, is_recommend, tahun_berdiri, created_at, franchise_categories(name)', { count: 'exact' })
        .order('created_at', { ascending: false })
        .range(from, to);

      if (query) q = q.ilike('nama', `%${query}%`);

      const { data, count, error } = await q;

      if (error) {
        document.getElementById('sf-tbody').innerHTML = `
          <tr><td colspan="9">
            <div class="sf-state sf-state-error">
              <div class="sf-state-icon">&#9888;</div>
              <h3>Gagal memuat data</h3>
              <p>${escHtml(error.message)}</p>
            </div>
          </td></tr>`;
        document.getElementById('sf-summary').style.display = 'none';
        document.getElementById('sf-pagination').style.display = 'none';
        return;
      }

      totalCount = count || 0;
      const rows = data || [];
      renderRows(rows);
      renderSummary(page, rows.length);
      renderPagination(page, Math.ceil(totalCount / PAGE_SIZE));
    }

    loadMerchants();
  </script>
</body>
