    }

    function formatIDR(num) {
      if (num == null) return '-';
      return 'Rp ' + Number(num).toLocaleString('id-ID');
    }

    function formatDate(str) {
      if (!str) return '-';
      return new Date(str).toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
    }

    function formatDateTime(str) {
      if (!str) return '-';
      return new Date(str).toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function resolveImg(url) {
      if (!url) return '';
      url = url.trim();
      if (url.includes('lh3.googleusercontent.com')) return url;
      let m = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
      if (m) return 'https://lh3.googleusercontent.com/d/' + m[1] + '=s600';
      m = url.match(/drive\.google\.com\/.*[?&]id=([a-zA-Z0-9_-]+)/);
      if (m) return 'https://lh3.googleusercontent.com/d/' + m[1] + '=s600';
      m = url.match(/drive\.google\.com\/thumbnail\?id=([a-zA-Z0-9_-]+)/);
      if (m) return 'https://lh3.googleusercontent.com/d/' + m[1] + '=s600';
      if (url.includes('squarespace-cdn.com')) return url + '?format=500w';
      return url;
    }

    function getYoutubeEmbedUrl(url) {
      if (!url) return null;
      let m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
      if (m) return 'https://www.youtube.com/embed/' + m[1];
      return null;
    }

    function renderDetail(m) {
      const support = m.franchise_support_merchant || [];
      const keunggulan = m.franchise_keunggulan_merchant || [];
      const photos = m.franchise_image_outlet || [];
      const embedUrl = getYoutubeEmbedUrl(m.video_url);
      const cat = m.franchise_categories;
      const sys = m.franchise_system;
      const mod = m.franchise_model;
      const ot = m.franchise_type_outlet;

      const badgesHtml = [
        m.is_verified ? `<span class="sf-badge sf-badge-verified">&#10003; Verified</span>` : '',
        m.is_recommend ? `<span class="sf-badge sf-badge-recommend">&#9733; Rekomendasi</span>` : '',
        m.data_confirmed_at
          ? `<span class="sf-badge sf-badge-confirmed">&#10003; Data Dikonfirmasi ${formatDate(m.data_confirmed_at)}</span>`
          : `<span class="sf-badge sf-badge-no">Belum Dikonfirmasi</span>`,
      ].filter(Boolean).join('');

      const supportHtml = support.length
        ? `<ul class="sf-list">${support.map(s => `<li><span class="sf-list-dot"></span><span>${escHtml(s.nama ?? s.support ?? s.keterangan ?? JSON.stringify(s))}</span></li>`).join('')}</ul>`
        : `<p class="sf-empty-list">Belum ada data support.</p>`;

      const keunggulanHtml = keunggulan.length
        ? `<ul class="sf-list">${keunggulan.map(k => `<li><span class="sf-list-dot"></span><span>${escHtml(k.nama ?? k.keunggulan ?? k.keterangan ?? JSON.stringify(k))}</span></li>`).join('')}</ul>`
        : `<p class="sf-empty-list">Belum ada data keunggulan.</p>`;

      const photosHtml = photos.length
        ? `<div class="sf-photo-grid">${photos.map(p => {
            const src = resolveImg(p.url ?? p.foto_url ?? p.image_url ?? '');
            return src ? `<div class="sf-photo-item"><img src="${escHtml(src)}" alt="" loading="lazy"></div>` : '';
          }).filter(Boolean).join('')}</div>`
        : `<p class="sf-empty-list">Belum ada foto outlet.</p>`;

      /* ── Update page header ── */
      const thumbSrc = resolveImg(m.thumbnail);
      document.getElementById('sf-page-thumb').innerHTML = thumbSrc
        ? `<img src="${escHtml(thumbSrc)}" alt="" loading="lazy" onerror="this.style.display='none'">`
        : '';
      document.getElementById('sf-page-title').textContent = m.nama;
      document.getElementById('sf-page-badges').innerHTML = badgesHtml;
      document.getElementById('sf-page-meta').textContent = `ID: ${m.id}  ·  Dibuat: ${formatDate(m.created_at)}`;
      document.getElementById('sf-btn-edit').href = 'merchant-edit?id=' + m.id;
      document.getElementById('sf-btn-hapus').href = 'merchant-delete?id=' + m.id;
      document.getElementById('sf-actions').style.display = 'flex';

      /* ── 2-column content ── */
      document.getElementById('sf-content').innerHTML = `
        <div class="sf-content-grid">

          <!-- Left column -->
          <div class="sf-col-left">

            <div class="sf-section">
              <div class="sf-section-title">Profil Utama</div>
              <div class="sf-section-body">
                <div class="sf-fields">
                  <div class="sf-field">
                    <label>Harga</label>
                    <div class="sf-field-value sf-price">${formatIDR(m.harga)}</div>
                  </div>
                  <div class="sf-field">
                    <label>Harga Coret</label>
                    <div class="sf-field-value sf-muted">${formatIDR(m.harga_coret)}</div>
                  </div>
                  <div class="sf-field">
                    <label>Tahun Berdiri</label>
                    <div class="sf-field-value">${m.tahun_berdiri || '-'}</div>
                  </div>
                  <div class="sf-field">
                    <label>Luas Min (m²)</label>
                    <div class="sf-field-value">${m.luas_bangunan_min ? escHtml(String(m.luas_bangunan_min)) + ' m²' : '-'}</div>
                  </div>
                  <div class="sf-field">
                    <label>BEP</label>
                    <div class="sf-field-value">${escHtml(m.bep || '-')}</div>
                  </div>
                  <div class="sf-field">
                    <label>Badan Usaha</label>
                    <div class="sf-field-value">${escHtml(m.badan_usaha || '-')}</div>
                  </div>
                </div>
              </div>
            </div>

            <div class="sf-section">
              <div class="sf-section-title">Kategori &amp; Klasifikasi</div>
              <div class="sf-section-body">
                <div class="sf-fields">
                  <div class="sf-field">
                    <label>Kategori</label>
                    <div class="sf-field-value">${cat ? escHtml(cat.name) : '-'}</div>
                  </div>
                  <div class="sf-field">
                    <label>Franchise System</label>
                    <div class="sf-field-value">${sys ? escHtml(sys.nama) : '-'}</div>
                  </div>
                  <div class="sf-field">
                    <label>Franchise Model</label>
                    <div class="sf-field-value">${mod ? escHtml(mod.nama) : '-'}</div>
                  </div>
                  <div class="sf-field">
                    <label>Tipe Outlet</label>
                    <div class="sf-field-value">${ot ? (ot.icon ? escHtml(ot.icon) + ' ' : '') + escHtml(ot.nama) : '-'}</div>
                  </div>
                </div>
              </div>
            </div>

          </div><!-- /col-left -->

          <!-- Right column -->
          <div class="sf-col-right">

            <div class="sf-section">
              <div class="sf-section-title">Deskripsi &amp; Video</div>
              <div class="sf-section-body">
                ${m.deskripsi_merchant
                  ? `<p class="sf-desc">${escHtml(m.deskripsi_merchant)}</p>`
                  : `<p class="sf-empty-list">Belum ada deskripsi.</p>`}
                ${m.video_url
                  ? embedUrl
                    ? `<div class="sf-video-wrap"><iframe src="${escHtml(embedUrl)}" allowfullscreen></iframe></div>`
                    : `<a class="sf-video-link" href="${escHtml(m.video_url)}" target="_blank" rel="noopener"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>Tonton Video</a>`
                  : ''}
              </div>
            </div>

            <div class="sf-section">
              <div class="sf-section-title">Foto Outlet (${photos.length})</div>
              <div class="sf-section-body">${photosHtml}</div>
            </div>

            <div class="sf-section">
              <div class="sf-section-title">Support yang Disediakan (${support.length})</div>
              <div class="sf-section-body">${supportHtml}</div>
            </div>

            <div class="sf-section">
              <div class="sf-section-title">Keunggulan (${keunggulan.length})</div>
              <div class="sf-section-body">${keunggulanHtml}</div>
            </div>

          </div><!-- /col-right -->

        </div><!-- /content-grid -->
      `;
    }

    function renderError(msg) {
      document.getElementById('sf-content').innerHTML = `
        <div class="sf-state sf-state-error">
          <div class="sf-state-icon">&#9888;</div>
          <h3>Merchant tidak ditemukan</h3>
          <p>${escHtml(msg)}</p>
          <a class="sf-btn sf-btn-back" href="merchant-dashboard" style="margin-top:20px;display:inline-flex">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
            Kembali ke Dashboard
          </a>
        </div>`;
    }

    async function loadDetail() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      if (!id || isNaN(Number(id))) {
        renderError('ID merchant tidak valid atau tidak ditemukan di URL.');
        return;
      }

      const merchantId = Number(id);

      const { data: merchant, error: merchantError } = await client
        .from('franchise_merchant')
        .select(`
          *,
          franchise_categories(name),
          franchise_system(nama),
          franchise_model(nama),
          franchise_type_outlet(nama, icon)
        `)
        .eq('id', merchantId)
        .single();

      if (merchantError || !merchant) {
        renderError(merchantError ? merchantError.message : 'Data merchant tidak ditemukan.');
        return;
      }

      const [supportRes, keunggulanRes, photosRes] = await Promise.all([
        client.from('franchise_support_merchant').select('*').eq('merchant_id', merchantId),
        client.from('franchise_keunggulan_merchant').select('*').eq('merchant_id', merchantId),
        client.from('franchise_image_outlet').select('*').eq('merchant_id', merchantId),
      ]);

      merchant.franchise_support_merchant = supportRes.data || [];
      merchant.franchise_keunggulan_merchant = keunggulanRes.data || [];
      merchant.franchise_image_outlet = photosRes.data || [];

      renderDetail(merchant);
    }

    loadDetail();
  </script>
